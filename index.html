<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adivina el Número</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Segoe UI',Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#eee;
    padding:20px;
    background: linear-gradient(270deg,#0f0c29,#302b63,#24243e,#0f0c29);
    background-size: 800% 800%;
    animation: gradientAnim 15s ease infinite;
    overflow:hidden;
  }

  @keyframes gradientAnim{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  #fondoAnimado{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:-1;
  }

  .game-card{
    background: rgba(0,0,0,0.6);
    border:2px solid #ffa502;
    border-radius:20px;
    padding:40px 30px;
    max-width:420px;
    width:100%;
    text-align:center;
    box-shadow:0 0 20px rgba(255,165,2,0.5);
    transition:border-color 0.5s,box-shadow 0.5s;
  }

  h1{ color:#ffa502; font-size:1.8rem; margin-bottom:8px; }
  .subtitle{ color:#aaa; margin-bottom:24px; }

  .controls{ display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
  input{
    padding:12px;
    font-size:18px;
    width:100px;
    text-align:center;
    border:2px solid rgba(255,165,2,0.5);
    border-radius:12px;
    background: rgba(255,255,255,0.05);
    color:#eee;
    outline:none;
    transition:border-color 0.3s, box-shadow 0.3s;
  }
  input:focus{ border-color:#ffa502; box-shadow:0 0 12px rgba(255,165,2,0.3);}
  input::-webkit-inner-spin-button, input::-webkit-outer-spin-button{-webkit-appearance:none;}
  input[type=number]{-moz-appearance:textfield;}

  button{
    padding:12px 24px;
    font-size:18px;
    background-color:#ffa502;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:transform 0.2s, background-color 0.3s;
  }
  button:hover{ background-color:#ffb84d; transform:translateY(-2px);}
  button:active{ transform:translateY(1px);}
  button:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  #mensaje{ font-size:24px; margin:20px 0; min-height:40px; transition: font-size 0.3s; }
  #contador{ font-size:16px; color:#ccc; }

  .historial{
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:20px; min-height:30px;
  }
  .guess-pill{
    padding:4px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
    transition: transform 0.2s;
  }
  .guess-pill:hover{ transform: scale(1.2); }

  #btnReiniciar{ background-color:#2ed573; margin-top:12px; display:none; }

  @media(max-width:480px){
    .game-card{ padding:30px 20px; }
    .controls{ flex-direction:column; align-items:center; }
    input{ width:80%; }
    button{ width:80%; }
  }

  body {
  background: url(6f5c58cbdb45d470fb21054337bbe0a4.gif) no-repeat center center fixed;
  background-size: cover; 
}

</style>
</head>
<body>

<canvas id="fondoAnimado"></canvas>

<div class="game-card" id="game-card">
  <h1>🎯 Adivina el Número</h1>
  <p class="subtitle">Estoy pensando en un número del 1 al 100...</p>

  <div class="controls">
    <input type="number" id="inputIntento" min="1" max="100" placeholder="?">
    <button id="btnAdivinar">Adivinar</button>
  </div>

  <p id="mensaje"></p>
  <p id="contador">Intentos: 0</p>
  <div id="historial" class="historial"></div>

  <button id="btnReiniciar">🔄 Jugar de nuevo</button>
</div>

<script src="script3.js"></script>

</body>
</html>
